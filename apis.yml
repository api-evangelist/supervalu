aid: supervalu
name: SuperValu
description: >-
  SuperValu was one of the largest grocery retail and wholesale distribution companies
  in the United States before being acquired by United Natural Foods (UNFI) in 2018
  for $2.9 billion. SuperValu operated retail grocery stores under multiple banners
  and provided wholesale distribution services. The supervalu.com domain now redirects
  to UNFI's wholesale food distribution platform. Suppliers interact with UNFI/SuperValu
  distribution through EDI (Electronic Data Interchange) and the myUNFI supplier portal.
